<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sederhana</title>
    <link rel="stylesheet" href="style..css">
</head>
<body>

    <header>
        <h1>Selamat Datang di Website Sederhana</h1>
    </header>

    <nav>
        <a href="#">Beranda</a>
        <a href="#">Tentang</a>
        <a href="#">Layanan</a>
        <a href="#">Kontak</a>
    </nav>

    <div class="main-container">
        
        <main class="content">
            <h2>Formulir Pendaftaran</h2>
            <p>Silakan isi formulir di bawah ini untuk mendaftar.</p>

            <form action="#">
                <label for="nama">Nama Lengkap:</label>
                <input type="text" id="nama" name="nama">

                <label for="email">Email:</label>
                <input type="email" id="email" name="email">

                <label for="password">Password:</label>
                <input type="password" id="password" name="password">

                <div class="radio-group">
                    <p>Jenis Kelamin:</p>
                    <label><input type="radio" name="gender" value="laki-laki"> Laki-laki</label>
                    <label><input type="radio" name="gender" value="perempuan"> Perempuan</label>
                </div>

                <div class="checkbox-group">
                    <p>Hobi:</p>
                    <label><input type="checkbox" name="hobi" value="musik"> Musik</label>
                    <label><input type="checkbox" name="hobi" value="olahraga"> Olahraga</label>
                    <label><input type="checkbox" name="hobi" value="membaca"> Membaca</label>
                </div>

                <label for="kota">Pilih Kota:</label>
                <select id="kota" name="kota">
                    <option value="jakarta">Jakarta</option>
                    <option value="bandung">Bandung</option>
                    <option value="surabaya">Surabaya</option>
                </select>

                <label for="pesan">Pesan Tambahan:</label>
                <textarea id="pesan" name="pesan" placeholder="Tulis pesan di sini..."></textarea>

                <button type="submit">Kirim</button>
            </form>
        </main>

        <aside class="sidebar">
            <h3>Sidebar</h3>
            <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.</p>
        </aside>

    </div>

</body>
</html>
